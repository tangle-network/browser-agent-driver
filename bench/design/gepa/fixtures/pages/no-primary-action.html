<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Acme Workspace</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #111; background: #fff; }
    header { padding: 24px 32px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    main { padding: 48px 32px; max-width: 960px; margin: 0 auto; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    button { background: #fff; border: 1px solid #d4d4d8; border-radius: 6px; padding: 10px 16px; font: inherit; cursor: pointer; }
    button:hover { background: #fafafa; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #555; margin: 0 0 32px; }
  </style>
</head>
<body>
  <header>
    <strong>Acme Workspace</strong>
    <nav>Projects · Members · Billing · Settings</nav>
  </header>
  <main>
    <h1>Welcome back, Sam</h1>
    <p>Pick something to do.</p>
    <div class="actions">
      <button>Create project</button>
      <button>Invite member</button>
      <button>Edit billing</button>
      <button>Change password</button>
      <button>Configure SSO</button>
      <button>Browse templates</button>
    </div>
  </main>
</body>
</html>
