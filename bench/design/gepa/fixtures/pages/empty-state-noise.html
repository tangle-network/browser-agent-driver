<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Inbox · Acme Mail</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #111; background: #fff; }
    main { display: grid; place-items: center; min-height: 100vh; padding: 32px; text-align: center; }
    .empty svg { width: 96px; height: 96px; opacity: 0.5; margin-bottom: 16px; }
    .empty h1 { font-size: 22px; margin: 0 0 8px; }
    .empty p { color: #6b7280; margin: 0 0 24px; max-width: 360px; }
    button { padding: 10px 18px; background: #2563eb; color: #fff; border: 0; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <div class="empty">
      <svg viewBox="0 0 64 64" fill="#94a3b8"><circle cx="32" cy="32" r="28" /></svg>
      <h1>Nothing here yet</h1>
      <p>Once activity happens, it'll show up here. For now, take a deep breath. ✨</p>
      <button>Got it</button>
    </div>
  </main>
</body>
</html>
