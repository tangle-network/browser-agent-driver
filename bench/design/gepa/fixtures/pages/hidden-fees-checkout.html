<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Checkout · Acme Pay</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; margin: 0; color: #111; background: #f7f7f9; }
    .wrap { max-width: 480px; margin: 64px auto; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p.muted { color: #6b7280; margin: 0 0 24px; }
    .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    .total { font-weight: 600; font-size: 18px; }
    button { width: 100%; padding: 14px; background: #111; color: #fff; border: 0; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 24px; }
    .legal { color: #9ca3af; font-size: 11px; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Confirm payment</h1>
    <p class="muted">You're paying Acme Pay.</p>
    <div class="row"><span>Annual subscription</span><span>$120.00</span></div>
    <div class="row total"><span>Total</span><span>$120.00</span></div>
    <button>Pay now</button>
    <p class="legal">By clicking Pay now you agree to the terms.</p>
  </div>
</body>
</html>
