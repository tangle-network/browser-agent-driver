name: 'bad design audit'
description: 'Run a vision-powered design audit on a URL and post results to the PR'
author: 'Tangle Network'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  url:
    description: 'URL to audit (typically a Vercel/Netlify preview URL)'
    required: true
  profile:
    description: 'Audit profile (general, saas, marketing, defi, vibecoded). Omit to auto-classify.'
    required: false
    default: ''
  pages:
    description: 'Maximum pages to crawl from the starting URL'
    required: false
    default: '3'
  fail-on-score-below:
    description: 'Fail the action if average score drops below this threshold (0-10)'
    required: false
    default: ''
  fail-on-critical:
    description: 'Fail the action if any critical findings are present'
    required: false
    default: 'false'
  comment-on-pr:
    description: 'Post audit results as a PR comment'
    required: false
    default: 'true'
  evolve:
    description: 'Run evolve loop to auto-fix findings (claude-code | codex | opencode | css)'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for posting comments (defaults to github.token)'
    required: false
    default: ${{ github.token }}
  bad-version:
    description: 'Version of @tangle-network/browser-agent-driver to install'
    required: false
    default: 'latest'
  openai-api-key:
    description: 'OpenAI API key for the audit LLM (only needed if not using claude-code provider)'
    required: false
  anthropic-api-key:
    description: 'Anthropic API key (only needed if using anthropic provider)'
    required: false

outputs:
  score:
    description: 'Average design audit score (0-10)'
    value: ${{ steps.audit.outputs.score }}
  findings:
    description: 'Total number of findings'
    value: ${{ steps.audit.outputs.findings }}
  critical:
    description: 'Number of critical findings'
    value: ${{ steps.audit.outputs.critical }}
  report-path:
    description: 'Path to the generated report.json'
    value: ${{ steps.audit.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install bad CLI
      shell: bash
      run: npm install -g @tangle-network/browser-agent-driver@${{ inputs.bad-version }}

    - name: Install Playwright Chromium
      shell: bash
      run: npx playwright install chromium --with-deps

    - name: Run design audit
      id: audit
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set -e

        ARGS=(
          design-audit
          --url "${{ inputs.url }}"
          --pages "${{ inputs.pages }}"
          --json
          --headless
          --sink "$RUNNER_TEMP/bad-audit"
        )

        if [ -n "${{ inputs.profile }}" ]; then
          ARGS+=(--profile "${{ inputs.profile }}")
        fi

        if [ -n "${{ inputs.evolve }}" ]; then
          ARGS+=(--evolve "${{ inputs.evolve }}" --project-dir "$GITHUB_WORKSPACE")
        fi

        bad "${ARGS[@]}"

        REPORT="$RUNNER_TEMP/bad-audit/report.json"
        if [ ! -f "$REPORT" ]; then
          echo "::error::report.json not found at $REPORT"
          exit 1
        fi

        SCORE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$REPORT','utf-8')).summary.avgScore.toFixed(1))")
        FINDINGS=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$REPORT','utf-8')).summary.totalFindings)")
        CRITICAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$REPORT','utf-8')).summary.critical)")

        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "findings=$FINDINGS" >> "$GITHUB_OUTPUT"
        echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
        echo "report=$REPORT" >> "$GITHUB_OUTPUT"

        echo "Score: $SCORE / 10"
        echo "Findings: $FINDINGS ($CRITICAL critical)"

    - name: Upload audit artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bad-design-audit
        path: ${{ runner.temp }}/bad-audit
        retention-days: 30

    - name: Post PR comment
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        SCORE: ${{ steps.audit.outputs.score }}
        FINDINGS: ${{ steps.audit.outputs.findings }}
        CRITICAL: ${{ steps.audit.outputs.critical }}
        REPORT: ${{ steps.audit.outputs.report }}
        PR_URL: ${{ github.event.pull_request.html_url }}
        URL: ${{ inputs.url }}
      run: |
        set -e

        # Build a markdown comment with the top fixes
        BODY=$(node -e "
          const fs = require('fs');
          const d = JSON.parse(fs.readFileSync(process.env.REPORT, 'utf-8'));
          const score = d.summary.avgScore.toFixed(1);
          const top = (d.topFixes || []).slice(0, 5);
          const bar = (n) => '█'.repeat(Math.round(n)) + '░'.repeat(10 - Math.round(n));
          let body = '## bad design audit\n\n';
          body += '**URL:** ' + process.env.URL + '\n';
          body += '**Score:** \`' + bar(score) + '\` ' + score + '/10\n';
          body += '**Findings:** ' + d.summary.totalFindings + ' (' + d.summary.critical + ' critical, ' + d.summary.major + ' major, ' + d.summary.minor + ' minor)\n\n';
          if (top.length > 0) {
            body += '### Top Fixes (by ROI)\n\n';
            top.forEach((f, i) => {
              const tags = [];
              if (f.pageCount && f.pageCount >= 2) tags.push('appears on ' + f.pageCount + ' pages');
              if (f.blast === 'system') tags.push('SYSTEMIC');
              const tagStr = tags.length ? ' _(' + tags.join(', ') + ')_' : '';
              body += (i+1) + '. **[' + f.severity + ']** ' + f.description + tagStr + '\n';
              body += '   - ROI: ' + (f.roi || 0).toFixed(1) + ' · Impact ' + (f.impact || '—') + ' · Effort ' + (f.effort || '—') + ' · Blast ' + (f.blast || '—') + '\n';
              if (f.cssSelector && f.cssFix) {
                body += '   - \`' + f.cssSelector + ' { ' + f.cssFix + ' }\`\n';
              }
              body += '\n';
            });
          }
          body += '---\n_Powered by [bad design-audit](https://github.com/tangle-network/browser-agent-driver)_';
          process.stdout.write(body);
        ")

        # Comment via gh CLI
        echo "$BODY" | gh pr comment "$PR_URL" --body-file -

    - name: Enforce thresholds
      if: always()
      shell: bash
      env:
        SCORE: ${{ steps.audit.outputs.score }}
        CRITICAL: ${{ steps.audit.outputs.critical }}
        FAIL_ON_SCORE_BELOW: ${{ inputs.fail-on-score-below }}
        FAIL_ON_CRITICAL: ${{ inputs.fail-on-critical }}
      run: |
        if [ "$FAIL_ON_CRITICAL" = "true" ] && [ "${CRITICAL:-0}" -gt 0 ]; then
          echo "::error::audit found $CRITICAL critical findings"
          exit 1
        fi
        if [ -n "$FAIL_ON_SCORE_BELOW" ]; then
          if (( $(echo "${SCORE:-0} < $FAIL_ON_SCORE_BELOW" | bc -l) )); then
            echo "::error::audit score $SCORE is below threshold $FAIL_ON_SCORE_BELOW"
            exit 1
          fi
        fi
