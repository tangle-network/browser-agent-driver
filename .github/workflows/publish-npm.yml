name: Publish NPM

on:
  push:
    tags:
      - 'browser-agent-driver-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish (must match package.json)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'tangle-network/browser-agent-driver'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Upgrade npm to the latest. The bundled npm in Node 22 is 10.x,
      # which has incomplete OIDC trusted-publisher support for scoped
      # packages — auth silently falls back to NPM_TOKEN if missing,
      # and the publish PUT returns a confusing 404. npm 11+ has the
      # full OIDC publish path for scoped packages.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Validate publish target
        id: validate
        run: |
          PKG_NAME="@tangle-network/browser-agent-driver"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_VERSION=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EXPECTED_VERSION="${{ github.event.inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ] && [[ "${GITHUB_REF_NAME}" == browser-agent-driver-v* ]]; then
            EXPECTED_VERSION="${GITHUB_REF_NAME#browser-agent-driver-v}"
          fi

          if [ -z "${EXPECTED_VERSION}" ]; then
            echo "Unsupported trigger or tag format."
            exit 1
          fi

          if [ "${EXPECTED_VERSION}" != "${PKG_VERSION}" ]; then
            echo "Version mismatch: expected ${EXPECTED_VERSION}, package.json has ${PKG_VERSION}"
            exit 1
          fi

          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PKG_NAME}@${PKG_VERSION} is already published."
            exit 1
          fi

          echo "version=${PKG_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Publish to npm (trusted publishing via OIDC)
        # Primary auth: GitHub OIDC validated against the trusted publisher
        # configured at:
        #   https://www.npmjs.com/package/@tangle-network/browser-agent-driver/access
        # Each publish is cryptographically tied to this commit + workflow
        # run, signed by GitHub's OIDC issuer, and provenance-attested.
        #
        # Fallback: NPM_TOKEN. Kept during the OIDC transition because npm
        # 10.x had spotty trusted-publisher support for scoped packages
        # and would silently 404 the publish PUT. After we verify a clean
        # OIDC publish on the npm-11 path, we can drop this fallback and
        # delete the NPM_TOKEN repo secret.
        run: npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
